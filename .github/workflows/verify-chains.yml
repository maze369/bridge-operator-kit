name: verify-chains

# Runs on every PR + push to main. Verifies:
#   1. Every chains/<key>/chain.yaml parses + has all required fields.
#   2. tools/build_agent_config.mjs produces valid output.
#   3. tools/gen_state.mjs produces valid output.
#   4. tools/gen_registry.mjs output is up-to-date (i.e., the
#      committed chains/REGISTRY.md matches what the generator outputs).
#   5. recovery/verify_bridge_health.mjs confirms every declared on-chain
#      address actually exists at the chain it claims.
#
# Skipped: any chain whose RPC is unreachable from GitHub runners just
# logs a soft warning — public RPCs can be flaky, the kit's strict
# verification job runs the same checks weekly from a known-good host.

on:
  pull_request:
    paths:
      - 'chains/**'
      - 'shared/**'
      - 'tools/**'
      - 'recovery/**'
      - '.github/workflows/verify-chains.yml'
  push:
    branches: [main]
    paths:
      - 'chains/**'
      - 'shared/**'
      - 'tools/**'
      - 'recovery/**'

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install yaml + ethers (workspace-wide)
        run: |
          npm init -y --silent >/dev/null
          npm install --silent --no-save yaml ethers@6

      - name: Validate every chain.yaml parses + required fields
        run: |
          node <<'EOF'
          import fs from 'node:fs';
          import path from 'node:path';
          import { parse } from 'yaml';

          const required = ['key', 'chainId', 'domain', 'protocol', 'name', 'rpcUrls', 'native', 'hyperlane'];
          const requiredHyp = ['mailbox', 'merkleTreeHook', 'validatorAnnounce', 'ismFactory'];
          let bad = 0;
          for (const e of fs.readdirSync('chains', { withFileTypes: true })) {
            if (!e.isDirectory() || e.name.startsWith('_') || e.name.startsWith('.')) continue;
            const yp = path.join('chains', e.name, 'chain.yaml');
            if (!fs.existsSync(yp)) {
              console.error(`FAIL: chains/${e.name}/chain.yaml missing`);
              bad++; continue;
            }
            const c = parse(fs.readFileSync(yp, 'utf8'));
            for (const f of required) {
              if (!c[f]) { console.error(`FAIL: chains/${e.name}/chain.yaml missing required field "${f}"`); bad++; }
            }
            for (const f of requiredHyp) {
              if (!c.hyperlane?.[f]) { console.error(`FAIL: chains/${e.name}/chain.yaml missing hyperlane.${f}`); bad++; }
            }
            if (c.key && c.key !== e.name) {
              console.error(`FAIL: chains/${e.name}/chain.yaml has key "${c.key}" but directory name is "${e.name}" — must match`);
              bad++;
            }
            console.log(`  parsed: chains/${e.name}/chain.yaml (key=${c.key}, chainId=${c.chainId})`);
          }
          if (bad) process.exit(1);
          EOF
        shell: bash

      - name: Build agent-config + state.json (must succeed)
        run: |
          node tools/build_agent_config.mjs
          node tools/gen_state.mjs --check
          node tools/gen_state.mjs >/tmp/state.json
          node -e "JSON.parse(require('fs').readFileSync('/tmp/state.json'))"
          echo "agent-config + state.json build OK"

      - name: Registry is up to date
        run: |
          node tools/gen_registry.mjs > /tmp/REGISTRY.md
          diff -u chains/REGISTRY.md /tmp/REGISTRY.md || {
            echo "::error::chains/REGISTRY.md is stale. Run: node tools/gen_registry.mjs > chains/REGISTRY.md"
            exit 1
          }

      - name: Verify on-chain (best effort — RPC reachability not strict)
        continue-on-error: true
        run: |
          cd recovery
          npm install --silent --no-save ethers@6 yaml
          node verify_bridge_health.mjs --verbose || echo "::warning::Some on-chain checks failed — review verifier output above"
