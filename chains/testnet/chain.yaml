# (private node, VPN, paid plan), set TESTNET_RPC in validator/.env.

key: testnet

chainId: 421018001
domain: 421018001
protocol: ethereum

name: "Infinite Testnet"
shortLabel: "TN"
color: "#9b87f5"

rpcUrls:
  - https://evm-rpc-testnet.infinitedrive.xyz
blockExplorer: https://testnet-scan.infinitedrive.xyz

finality:
  reorgPeriod: 5

native:
  symbol: tdrop
  decimals: 18

hyperlane:
  mailbox: "0xE6A0157d3228De40534EC544F0D86F7331D26Ba6"
  merkleTreeHook: "0xC671E6c77fD5BEAeDc59112E34b23e503b7c0D49"
