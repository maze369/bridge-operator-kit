  chunk: 2000

# Testnet's Ethermint min gas price is 20e9 tdrop. Pinned via the kit's
# transactionOverrides so 0-price txs (which the chain accepts via
# eth_gasPrice but the agent's default EIP-1559 logic underprices) get
# the right floor.
transactionOverrides:
  gasPrice: "20000000000"
