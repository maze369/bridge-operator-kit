# chain.yaml — preset for a single chain.
#
# Operators do NOT edit this file. To customise an RPC for your host
# (private node, VPN, paid plan), set <KEY>_RPC in validator/.env —
# the agent will prefer that over the URLs listed below.
#
# To add a new chain to the kit: copy this dir to chains/<your-key>/
# and fill in real values. The kit's drive.sh wrappers + the agent
# config merger (tools/build_agent_config.mjs) read this file as the
# single source of chain facts.

# Short lowercase key — used as the chain's identifier everywhere
# (CLI args, env-var prefixes, agent-config.json key). MUST match the
# directory name under chains/. Lowercase letters, digits, dashes only.
key: example-chain

# Chain identity
chainId: 99001
domain: 99001                # Hyperlane domain — usually == chainId
protocol: ethereum           # ethereum | cosmosnative

# UI / display
name: "Example Chain"
shortLabel: "EX"             # 2-char label for compact UI
color: "#3b82f6"             # brand color (CSS hex)

# Public RPCs — the agent connects in order, falls over on errors.
# Use a same-origin proxy URL ("/bridge/rpc/<key>") if your UI is
# served from a host that has internal Docker access to the node.
rpcUrls:
  - https://rpc.example.org
  - https://rpc-fallback.example.org
blockExplorer: https://scan.example.org

# Block finality. reorgPeriod = the depth (in blocks) that validators
# wait before signing. Higher = safer, slower. Standard L2: 5–10.
# Long-finality L1 (Ethereum mainnet, etc.): 64+.
finality:
  reorgPeriod: 5

# Native asset
native:
  symbol: NATIVE
  decimals: 18

# Hyperlane core contract addresses. Filled in by deployer/deploy_evm_core.mjs
# (or `infinited tx hyperlane …` on Cosmos chains). Leave as the zero
# address until you've run ADD_CHAIN.md.
hyperlane:
  mailbox: "0x0000000000000000000000000000000000000000"
  merkleTreeHook: "0x0000000000000000000000000000000000000000"
  validatorAnnounce: "0x0000000000000000000000000000000000000000"
  # StaticMessageIdMultisigIsmFactory — used by tools/promote_operator.sh
  # when the validator set or threshold changes.
  ismFactory: "0x0000000000000000000000000000000000000000"

# Block to start validator indexing from. Set to (or just before) the
# mailbox deploy block — saves 100x backfill time on fresh chains.
# `chunk` is the eth_getLogs window size; drop to 100 if the chain's
# RPC truncates large windows.
index:
  from: 1
  chunk: 2000

# Optional per-chain transaction override for both deploy scripts and
# the agent. Use this for chains with legacy/flat-fee gas pricing
# (gasPrice fixed at a chain-wide constant). String, so values > u64
# don't lose precision in JSON/YAML parsing.
# Standard EIP-1559 chains: omit this block entirely.
#
# transactionOverrides:
#   gasPrice: "20000000000"
