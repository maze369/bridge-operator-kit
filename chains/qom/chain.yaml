# chain.yaml — QOM L1 preset
#
# Operators do NOT edit this file. To customise an RPC for your host
# (private node, VPN, paid plan), set QOM_RPC in validator/.env.

key: qom

chainId: 766
domain: 766
protocol: ethereum

name: "QOM L1"
shortLabel: "QM"
color: "#3b82f6"

rpcUrls:
  - https://evm-rpc-ql1.foxxone.one
blockExplorer: https://scan.qom.network

finality:
  # QOM has fast finality; reorgPeriod 2 is conservative.
  reorgPeriod: 2

native:
  symbol: QOM
  decimals: 18

hyperlane:
  mailbox: "0xdf4037da7c146f08cd1b2a1b31df6409dd775df1"
  merkleTreeHook: "0x9b3b0b910ae816c8d57201612fd0478a2362814f"
  validatorAnnounce: "0xf45dbF4846ED5cbe7F8fF2Bc1230f467f916c0c3"
  ismFactory: "0xa080345322D3De474F3479687238580745DD90E3"

index:
  # Mailbox was deployed around this block — backfill from here.
  from: 11003000
  chunk: 100

# QOM is legacy-only (no EIP-1559 typed txs) with a flat 18e18 gasPrice.
# Deploy scripts + the agent MUST send type:0 legacy txs at this gas
# price. String to survive YAML/JSON number parsing — 18e18 > i64.
transactionOverrides:
  gasPrice: "18000000000000000000"
